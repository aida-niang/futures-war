version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futures-war-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    networks:
      - futures-war-network

  frontend:
    image: node:18-alpine
    container_name: futures-war-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: npx http-server . -p 3000
    networks:
      - futures-war-network
    depends_on:
      - backend

networks:
  futures-war-network:
    driver: bridge
